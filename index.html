<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist Generator</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<!-- =============================================
     SIDEBAR — pre-built, saved playlists
     Students do NOT modify this section
============================================= -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-logo">♫</span>
    <h2 class="sidebar-title">My Playlists</h2>
  </div>

  <button class="btn btn-new-playlist" id="newPlaylistBtn">
    <span class="btn-icon">+</span> New Playlist
  </button>

  <ul class="playlist-list" id="playlistList">
    <!-- Populated by sidebar.js -->
  </ul>

  <div class="sidebar-footer">
    <button class="btn btn-export" id="exportBtn" title="Export playlists to JSON">
      ↓ Export
    </button>
    <label class="btn btn-import" title="Import playlists from JSON">
      ↑ Import
      <input type="file" id="importInput" accept=".json" style="display: none" />
    </label>
  </div>
</aside>

<!-- =============================================
     MAIN APP
============================================= -->
<main class="main">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">☰</button>
      <div class="wordmark">Playlist Generator</div>
    </div>
    <div class="topbar-center">
      <div class="playlist-name-wrap" id="playlistNameWrap">
        <span class="playlist-name-edit-icon">✎</span>
        <input
            type="text"
            class="playlist-name-input"
            id="playlistNameInput"
            value="Study Music"
            placeholder="Playlist name..."
            maxlength="40"
        />
        <button class="playlist-name-confirm" id="playlistNameConfirm" title="Done">✓</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-save-playlist" id="savePlaylistBtn">Save Playlist</button>
      <span class="track-count" id="trackCount">0 tracks</span>
    </div>
  </header>

  <div class="content">
    <!-- Search Panel -->
    <section class="panel search-panel">
      <h3 class="panel-title">Search Songs</h3>
      <div class="search-bar">
        <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="Search artist, song, or album…"
        />
        <button class="btn btn-search" id="searchBtn">Search</button>
      </div>

      <div class="search-results" id="searchResults">
        <p class="empty-state">Search for a song to get started.</p>
      </div>
    </section>

    <!-- Playlist Panel -->
    <section class="panel playlist-panel">
      <div class="playlist-panel-header">
        <h3 class="panel-title">Your Playlist</h3>
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="favorites">♥ Favorites</button>
        </div>
      </div>

      <ul class="track-list" id="trackList">
        <!-- Populated by app.js renderPlaylist() -->
      </ul>

      <p class="empty-state" id="playlistEmpty" style="display: none">
        No tracks yet. Search and add some songs!
      </p>
    </section>
  </div>
</main>

<!-- Audio player (hidden, used for previews) -->
<div class="preview-player" id="previewPlayer" style="display: none">
  <audio id="previewAudio"></audio>
  <div class="preview-player-inner">
    <img class="preview-art" id="previewArt" src="" alt="" />
    <div class="preview-info">
      <span class="preview-title" id="previewTitle"></span>
      <span class="preview-artist" id="previewArtist"></span>
    </div>
    <div class="preview-controls">
      <span class="preview-time" id="previewTime">0:00</span>
      <button class="preview-close" id="previewClose">✕</button>
    </div>
  </div>
  <div class="preview-progress-bar">
    <div class="preview-progress-fill" id="previewProgressFill"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="sidebar.js"></script>
</body>
</html>
